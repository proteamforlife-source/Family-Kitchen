<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Kitchen</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#8FA68E;--saged:#6d8a6c;--cream:#F6F1E8;--terra:#C97B63;--terrad:#a85e47;
  --charcoal:#2B2B2B;--muted:#7a7a6a;--card:#fff;--border:#ddd6c8;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--gl:#eaf3ea;--re:#c0392b;--bl:#3a7bd5;
}
body{font-family:'Segoe UI',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh}

#loading{display:none}

#nameModal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
#nameModal.hidden{display:none}
.modal-box{background:var(--card);border-radius:20px;padding:32px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box h2{color:var(--terra);font-size:1.7rem;margin-bottom:8px}
.modal-box p{color:var(--muted);margin-bottom:20px}
.modal-box input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:1rem;margin-bottom:14px;outline:none;font-family:inherit}
.modal-box input:focus{border-color:var(--terra)}

header{background:var(--sage);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
header h1{font-size:1.25rem;font-weight:700}
.user-pill{background:rgba(255,255,255,.25);padding:5px 13px;border-radius:20px;font-size:.83rem;cursor:pointer}

nav{background:var(--card);border-bottom:2px solid var(--border);display:flex;position:sticky;top:53px;z-index:99;overflow-x:auto}
nav button{flex:1;min-width:70px;padding:13px 4px;border:none;background:none;font-size:.75rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.a{color:var(--terra);border-bottom-color:var(--terra)}
nav button:hover{background:var(--cream)}

main{max-width:720px;margin:0 auto;padding:18px 14px}
.sec{display:none}.sec.a{display:block}

.card{background:var(--card);border-radius:13px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.af{background:var(--cream);border-radius:13px;padding:16px;margin-bottom:18px;border:1px solid var(--border)}
.af h3{margin-bottom:12px;color:var(--terrad);font-size:.93rem;font-weight:700}
.fr{display:flex;flex-direction:column;gap:9px}
.fr input,.fr textarea,.fr select{padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.92rem;background:#fff;outline:none;font-family:inherit;color:var(--charcoal)}
.fr input:focus,.fr textarea:focus{border-color:var(--terra)}
.fr textarea{resize:vertical;min-height:75px}
.btn{background:var(--terra);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.92rem}
.btn:hover{background:var(--terrad)}
.btn-sage{background:var(--sage);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.92rem}
.btn-sage:hover{background:var(--saged)}
.bsm{padding:5px 11px;border-radius:7px;border:none;font-size:.8rem;font-weight:600;cursor:pointer}
.bt{background:var(--terra);color:#fff}
.bs{background:var(--sage);color:#fff}
.bx{background:var(--border);color:var(--muted)}
.sec-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--charcoal)}
.tag{background:var(--cream);padding:2px 9px;border-radius:20px;font-size:.76rem;color:var(--terrad);font-weight:600;border:1px solid var(--border);cursor:pointer;display:inline-block;margin:2px}
.tag.active{background:var(--terra);color:#fff;border-color:var(--terra)}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;padding:2px 5px;border-radius:5px;font-size:.95rem;flex-shrink:0}
.del-btn:hover{color:var(--re);background:#ffeaea}
.emp{text-align:center;padding:36px 16px;color:var(--muted)}
.emp span{font-size:2.8rem;display:block;margin-bottom:10px}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:150px;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;outline:none;font-family:inherit;background:#fff}
.search-bar input:focus{border-color:var(--terra)}
.tags-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}

/* RECIPE CARDS */
.rc{background:var(--card);border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow);border:1px solid var(--border)}
.rb{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.rb.o{display:block}
.rb h4{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rb ul{padding-left:16px;margin-bottom:10px}
.rb ul li{font-size:.88rem;margin-bottom:2px}
.rb p{font-size:.88rem;line-height:1.65;white-space:pre-line}
.rbs{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.bo{background:none;border:1.5px solid var(--border);padding:4px 11px;border-radius:7px;font-size:.78rem;cursor:pointer;color:var(--muted);font-weight:600}
.bo:hover{background:var(--cream)}
.bo-t{border-color:var(--terra);color:var(--terra)}
.bo-s{border-color:var(--sage);color:var(--sage)}

/* EDIT FORM */
.edit-form{background:#fff8f5;border-radius:10px;padding:12px;margin-top:10px;border:1.5px solid var(--terra);display:none}
.edit-form.o{display:block}
.edit-form input,.edit-form textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;margin-bottom:8px;outline:none;font-family:inherit;background:#fff}
.edit-form input:focus,.edit-form textarea:focus{border-color:var(--terra)}
.edit-form textarea{min-height:80px;resize:vertical}

/* NOTES */
.note-item{background:var(--cream);border-radius:7px;padding:7px 10px;margin-bottom:5px;font-size:.83rem;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.note-who{font-size:.72rem;color:var(--terra);font-weight:600;white-space:nowrap}
.add-note-row{display:flex;gap:7px;margin-top:7px}
.add-note-row input{flex:1;padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;font-family:inherit}
.add-note-row input:focus{border-color:var(--terra)}

/* COOK MODE - Light & Friendly */
#ck{position:fixed;inset:0;background:#FDF8F3;z-index:999;display:none;flex-direction:column}
#ck.s{display:flex}
.ch{background:var(--sage);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ct{color:#fff;font-size:1.1rem;font-weight:700;flex:1;margin-right:10px}
.cb{background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.5);color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600}
.ckb{flex:1;overflow-y:auto;padding:20px}
.ck-sec-title{color:var(--terra);font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.ck-ing-list{list-style:none;padding:0;margin-bottom:28px}
.ck-ing-list li{display:flex;gap:14px;padding:11px 14px;border-radius:10px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);align-items:center}
.ck-qty{color:var(--terra);font-weight:700;min-width:110px;font-size:1rem}
.ck-name{color:var(--charcoal);font-size:1rem}
.ck-step{background:var(--card);border-radius:14px;padding:22px;margin-bottom:10px;border:2px solid var(--border);display:none;box-shadow:var(--shadow)}
.ck-step.ac,.ck-step.sa{display:block}
.ck-step.ac{border-color:var(--terra)}
.ck-step-lbl{color:var(--terra);font-size:.82rem;font-weight:700;text-transform:uppercase;margin-bottom:10px}
.ck-step-txt{color:var(--charcoal);font-size:1.15rem;line-height:1.75}
.ck-step-txt .qty{color:var(--terra);font-weight:700}
.cf{background:var(--card);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid var(--border);flex-shrink:0}
.cn{background:var(--terra);color:#fff;border:none;padding:13px 28px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
.cn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.cp{color:var(--muted);font-size:.9rem;text-align:center;font-weight:600}

/* EVENTS */
.eb{display:inline-block;background:var(--terra);color:#fff;padding:2px 9px;border-radius:20px;font-size:.76rem;font-weight:600;margin-top:4px}
.dish-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;margin-bottom:5px;background:var(--cream);border:1.5px solid var(--border);transition:all .2s}
.dish-row.claimed{background:#eaf3ea;border-color:var(--sage)}
.dish-chk{width:19px;height:19px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.dish-nm{flex:1;font-size:.92rem;font-weight:500}
.dish-who{font-size:.78rem;color:var(--sage);font-weight:700;white-space:nowrap}
.dish-recipe-link{font-size:.72rem;color:var(--terra);margin-left:4px}

/* DISH INPUT */
.dish-input-wrap{margin-top:10px}
.dish-ac-wrap{position:relative}
.dish-ac-input{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;outline:none;font-family:inherit;background:#fff}
.dish-ac-input:focus{border-color:var(--terra)}
.dish-ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--terra);border-radius:0 0 9px 9px;z-index:100;max-height:150px;overflow-y:auto;display:none}
.dish-ac-item{padding:8px 13px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)}
.dish-ac-item:hover{background:var(--cream)}
.dish-add-btn{background:var(--terra);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-weight:600;cursor:pointer;font-size:.88rem;margin-top:6px;width:100%}

/* MY PAGE */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.week-nav button{background:var(--sage);color:#fff;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600}
.week-nav span{font-weight:700;color:var(--charcoal);font-size:.9rem}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.day-card{background:var(--card);border-radius:9px;padding:6px 5px;border:1px solid var(--border);min-width:0}
.day-card.today{border-color:var(--terra);background:#fdf5f3}
.day-card h4{font-size:.68rem;font-weight:700;text-align:center;color:var(--muted);margin-bottom:2px;text-transform:uppercase}
.day-date{font-size:.6rem;text-align:center;color:var(--muted);margin-bottom:4px}

/* Slot pills */
.slot-group{margin-bottom:4px}
.slot-hdr{font-size:.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:1px}
.meal-pill{background:#fff3ee;border:1px solid #f0c4b0;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:var(--terrad)}
.snack-pill{background:#fff8ee;border:1px solid #f0d9b0;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#8a6020}
.work-pill{background:#e8f0fe;border:1px solid #b0c4f0;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#1a3a8a}
.uni-pill{background:#f3e8ff;border:1px solid #c4a0f0;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#5a1a9a}
.appt-pill{background:#e8fff0;border:1px solid #a0f0c4;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#1a6a3a}
.workout-pill{background:#fff0e8;border:1px solid #f0c0a0;border-radius:4px;padding:2px 5px;font-size:.63rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#7a3010}
.add-pill{background:none;border:1px dashed var(--border);width:100%;padding:2px;border-radius:4px;color:var(--muted);cursor:pointer;font-size:.6rem;margin-bottom:2px}
.add-pill:hover{border-color:var(--terra);color:var(--terra)}

/* QUOTE */
.quote-box{background:linear-gradient(135deg,var(--sage),var(--saged));border-radius:13px;padding:20px;margin-bottom:18px;text-align:center;color:#fff}
.quote-text{font-size:1rem;line-height:1.6;font-style:italic;margin-bottom:8px}
.quote-author{font-size:.8rem;opacity:.85;margin-bottom:14px}
.quote-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qbtn{background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600}

/* GOALS & WORKOUT */
.section-box{background:var(--card);border-radius:13px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.section-box h3{font-size:.9rem;font-weight:700;color:var(--terrad);margin-bottom:10px}
.section-box textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.88rem;background:var(--cream);outline:none;font-family:inherit;resize:vertical;min-height:80px}

/* SHOPPING */
.shop-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.shop-item:last-child{border-bottom:none}
.shop-chk{width:19px;height:19px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.shop-name{flex:1;font-size:.92rem}
.shop-name.done{text-decoration:line-through;color:var(--muted)}
.shop-by{font-size:.76rem;color:var(--sage);font-weight:600}
.shop-add-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.shop-add-row input{flex:1;min-width:140px;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;outline:none;font-family:inherit;background:#fff}
.shop-add-row input:focus{border-color:var(--terra)}

/* MINI MODAL */
.mm{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500}
.mm.h{display:none}
.mx{background:var(--card);border-radius:15px;padding:22px;max-width:320px;width:90%;box-shadow:0 6px 28px rgba(0,0,0,.18)}
.mx h3{margin-bottom:12px;color:var(--terra);font-size:.97rem}
.mx input,.mx select,.mx textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;margin-bottom:10px;outline:none;font-family:inherit;background:#fff}
.mx input:focus,.mx textarea:focus{border-color:var(--terra)}
.mr2{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:500px){.week-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="loading">
  <h1>🍽️</h1>
  <h1 style="font-size:1.8rem">Family Kitchen</h1>
  <p>Loading your kitchen...</p>
</div>

<div id="nameModal" class="hidden">
  <div class="modal-box">
    <h2>🍽️</h2>
    <h2>Family Kitchen</h2>
    <p>What's your name? We'll remember you!</p>
    <input id="ni" type="text" placeholder="Enter your name..." maxlength="30">
    <button class="btn" id="jb" style="width:100%">Join the Kitchen 🍽️</button>
  </div>
</div>

<!-- Day modal -->
<div class="mm h" id="dayModal">
  <div class="mx">
    <h3 id="dayModalTitle">Add to Day</h3>
    <select id="dayModalType">
      <option value="B">🌅 Breakfast</option>
      <option value="L">☀️ Lunch</option>
      <option value="S">🍎 Snack</option>
      <option value="work">💼 Work</option>
      <option value="uni">🎓 Uni</option>
      <option value="appt">📅 Appointment</option>
      <option value="workout">💪 Workout</option>
    </select>
    <input id="dayModalInput" type="text" placeholder="Details...">
    <div id="recipePickerWrap" style="display:none;margin-bottom:10px">
      <select id="recipePicker" style="width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;outline:none;background:#fff">
        <option value="">— Link a recipe (optional) —</option>
      </select>
    </div>
    <div class="mr2">
      <button class="bsm bx" id="dayModalCancel">Cancel</button>
      <button class="bsm bt" id="dayModalSave">Save</button>
    </div>
  </div>
</div>

<!-- Cook mode -->
<div id="ck">
  <div class="ch">
    <div class="ct" id="ckt"></div>
    <div style="display:flex;gap:8px">
      <button class="cb" id="cka">📋 All Steps</button>
      <button class="cb" id="cke">✕ Exit</button>
    </div>
  </div>
  <div class="ckb" id="ckb"></div>
  <div class="cf">
    <button class="cn" id="ckp">← Prev</button>
    <span class="cp" id="ckpr"></span>
    <button class="cn" id="ckn">Next →</button>
  </div>
</div>

<header>
  <h1>🍽️ Family Kitchen</h1>
  <div class="user-pill" id="up">👤 ...</div>
</header>
<nav>
  <button class="a" id="t-r">📖 Recipes</button>
  <button id="t-e">🗓️ Events</button>
  <button id="t-s">🛒 Shopping</button>
  <button id="t-m">👤 My Page</button>
</nav>

<main>
  <!-- RECIPES -->
  <div id="r" class="sec a">
    <div class="af">
      <h3>➕ Add Recipe</h3>
      <div class="fr">
        <input id="rn" type="text" placeholder="Recipe name">
        <input id="rcat" type="text" placeholder="Category (e.g. Mains, Desserts, Breakfast)">
        <input id="rtags" type="text" placeholder="Tags, comma-separated (e.g. gluten free, quick, whole food)">
        <input id="ri" type="text" placeholder="Ingredients with quantities, comma-separated (e.g. 200g flour, 2 eggs)">
        <textarea id="rs" placeholder="Method — one step per line. Include quantities in each step e.g. Add 200g flour"></textarea>
        <button class="btn" id="arb">Save Recipe</button>
      </div>
    </div>
    <div class="search-bar">
      <input id="rsearch" type="text" placeholder="🔍 Search recipes...">
    </div>
    <div class="tags-filter" id="tagsFilter"></div>
    <div class="sec-title">📖 Family Recipes</div>
    <div id="rl"></div>
  </div>

  <!-- EVENTS -->
  <div id="e" class="sec">
    <div class="af">
      <h3>➕ Add an Event</h3>
      <div class="fr">
        <input id="en" type="text" placeholder="Event name (e.g. Sunday BBQ 🔥)">
        <input id="ed" type="date">
        <input id="ex2" type="text" placeholder="Notes (optional)">
        <button class="btn" id="aeb">Save Event</button>
      </div>
    </div>
    <div class="sec-title">🗓️ Events</div>
    <div id="el"></div>
  </div>

  <!-- SHOPPING -->
  <div id="s" class="sec">
    <div class="sec-title">🛒 Shopping List</div>
    <div class="shop-add-row">
      <input id="shopInput" type="text" placeholder="Add an item...">
      <button class="btn" id="shopAddBtn">Add</button>
    </div>
    <div class="card" id="shopList"><div class="emp"><span>🛒</span>List is empty!</div></div>
    <button class="btn-sage" id="shopClearBtn" style="margin-top:10px;font-size:.85rem;padding:8px 16px">Clear Bought Items</button>
  </div>

  <!-- MY PAGE -->
  <div id="m" class="sec">
    <div id="mp"></div>
  </div>
</main>

<script>

firebase.initializeApp(firebaseConfig);

// COOK MODE - Light & friendly with quantities in steps
function parseIng(s){
  var m=s.match(/^([\d¼½¾⅓⅔\/\.\s]+\s*(?:g|kg|ml|tsp|tbsp|tbs|cups?|fl oz|oz|lbs?|pinch|bunch|handful|slices?|cans?|tins?|pieces?|cloves?|sprigs?|stalks?|rashers?|sheets?|heads?)\.?)\s+(.+)$/i);
  if(m&&m[2]&&m[2].length>1){return{q:m[1].trim(),n:m[2].trim(),full:s};}
  return{q:'',n:s,full:s};
}
function highlightQtysInStep(step, parsedIngs){
  var result=esc(step);
  parsedIngs.forEach(function(p){
    if(!p.q)return;
    var firstName=p.n.replace(/[,\(].*/,'').trim().split(' ')[0];
    if(!firstName||firstName.length<3)return;
    try{
      var safe=firstName.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
      var re=new RegExp('('+safe+'\\w*)','gi');
      var replaced=false;
      result=result.replace(re,function(m){
        if(replaced)return m;
        replaced=true;
        return'<span class="qty">'+esc(p.q)+' '+m+'</span>';
      });
    }catch(e){}
  });
  return result;
}

function renderEvents(){

  var sorted=events.slice().sort(function(a,b){return(a.date||'9999')<(b.date||'9999')?-1:1;});
  var canDel=un===ADMIN;
  el.innerHTML=sorted.map(function(ev){
    var dishes=ev.dishes?Object.values(ev.dishes):[];
    return '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div><b style="font-size:1rem">'+esc(ev.name)+'</b>'+
          (ev.date?'<br><span class="eb">📅 '+fd(ev.date)+'</span>':'')+
          (ev.desc?'<p style="font-size:.86rem;color:var(--muted);margin-top:5px">'+esc(ev.desc)+'</p>':'')+'</div>'+
        (canDel?'<button class="del-btn" data-de="'+ev.id+'">🗑</button>':'')+
      '</div>'+
      '<div style="margin-top:12px">'+
        '<div style="font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Who\'s Bringing What</div>'+
        dishes.map(function(d){
          var linkedRec=d.recipeId?recipes.find(function(r){return r.id===d.recipeId;}):null;
          var isClaimed=!!d.by;
          return '<div class="dish-row'+(isClaimed?' claimed':'')+'">'+
            '<input type="checkbox" class="dish-chk"'+(isClaimed?' checked':'')+' data-dci="'+d.id+'" data-dev="'+ev.id+'">'+
            '<span class="dish-nm">'+esc(d.name)+
              (linkedRec?'<span class="dish-recipe-link">🔗 '+esc(linkedRec.name)+'</span>':'')+
            '</span>'+
            (isClaimed?'<span class="dish-who">✅ '+esc(d.by)+'</span>':'')+
            (!isClaimed&&canDel?'<button class="del-btn" data-dd="'+d.id+'" data-dev="'+ev.id+'">🗑</button>':'')+
          '</div>';
        }).join('')+
        '<div class="dish-input-wrap" id="diw_'+ev.id+'">'+
          '<div class="dish-ac-wrap">'+
            '<input type="text" class="dish-ac-input" id="dac_'+ev.id+'" placeholder="Type dish or search recipes..." autocomplete="off">'+
            '<div class="dish-ac-list" id="dal_'+ev.id+'"></div>'+
          '</div>'+
          '<button class="dish-add-btn" data-dadd="'+ev.id+'">+ Add Dish (or press Enter)</button>'+
        '</div>'+
      '</div></div>';
  }).join('');

  // Attach autocomplete listeners
  events.forEach(function(ev){
    var inp=g('dac_'+ev.id);var list=g('dal_'+ev.id);if(!inp||!list)return;
    inp.addEventListener('input',function(){
      var q=inp.value.toLowerCase();list.innerHTML='';
      if(!q){list.style.display='none';return;}
      var matches=recipes.filter(function(r){return r.name.toLowerCase().includes(q);}).slice(0,6);
      if(!matches.length){list.style.display='none';return;}
      list.style.display='block';
      list.innerHTML=matches.map(function(r){return'<div class="dish-ac-item" data-recname="'+esc(r.name)+'" data-recid="'+r.id+'">'+esc(r.name)+'</div>';}).join('');
    });
    inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();addDishToEvent(ev.id);}});
  });
}

function addDishToEvent(evid){
  var inp=g('dac_'+evid);if(!inp||!inp.value.trim())return;
  var list=g('dal_'+evid);if(list)list.style.display='none';
  var did='d'+Date.now();
  var dish={id:did,name:inp.value.trim(),by:''};
  // check if matches a recipe
  var matched=recipes.find(function(r){return r.name.toLowerCase()===inp.value.trim().toLowerCase();});
  if(matched)dish.recipeId=matched.id;
  db.ref('events/'+evid+'/dishes/'+did).set(dish);
  inp.value='';inp.focus();
}

function savePersonal(path,val){if(!un)return;db.ref('personal/'+un+'/'+path).set(val);}

function renderMyPage(){
  if(!un){g('mp').innerHTML='<div class="emp"><span>👤</span>Please enter your name first!</div>';return;}
  var dates=getWeekDates(currentWeekOffset);
  var weekStart=dates[0],weekEnd=dates[6];
  var weekLabel=weekStart.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+weekEnd.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
  var today=todayKey();
  var quote=personalData.quote||QUOTES[Math.floor(Math.random()*QUOTES.length)];
  var weekGoalKey='goals_'+dateKey(weekStart);
  var weekWorkoutKey='workout_'+dateKey(weekStart);
  var goals=personalData.goals||{};
  var workout=personalData.workout||{};

  function pillType(type,text){
    var icons={B:'🌅',L:'☀️',S:'🍎',work:'💼',uni:'🎓',appt:'📅',workout:'💪'};
    var classes={B:'meal-pill',L:'meal-pill',S:'snack-pill',work:'work-pill',uni:'uni-pill',appt:'appt-pill',workout:'workout-pill'};
    // Only show labels for calendar types, not meal types
    var labels={work:'WORK',uni:'UNI',appt:''};
    var prefix=icons[type]||'📌';
    var labelStr=labels[type]!==undefined&&labels[type]?'<b style="font-size:.58rem">'+labels[type]+'</b> ':'';
    var shortText=text.length>9?text.slice(0,9)+'…':text;
    return'<div class="'+(classes[type]||'cal-pill')+'">'+prefix+' '+labelStr+esc(shortText)+'<button class="del-btn" style="font-size:.55rem;padding:0 2px" data-delday-id="__ID__" data-dk="__DK__">✕</button></div>';
  }

  var html='<div class="quote-box"><div class="quote-text">"'+esc(quote.q)+'"</div><div class="quote-author">— '+esc(quote.a)+'</div><div class="quote-btns"><button class="qbtn" id="newQuoteBtn">✨ New Quote</button><button class="qbtn" id="myQuoteBtn">✏️ My Own</button></div></div>'+
  '<div class="week-nav"><button id="prevWeek">← Prev</button><span>'+weekLabel+'</span><button id="nextWeek">Next →</button></div>'+
  '<div class="week-grid">'+
  dates.map(function(d,i){
    var dk=dateKey(d);var isToday=dk===today;
    var dayData=(personalData.days&&personalData.days[dk])||{};
    var items=dayData.items?Object.values(dayData.items):[];
    var bItems=items.filter(function(x){return x.type==='B';});
    var lItems=items.filter(function(x){return x.type==='L';});
    var sItems=items.filter(function(x){return x.type==='S';});
    var calItems=items.filter(function(x){return x.type==='work'||x.type==='uni'||x.type==='appt'||x.type==='workout';});
    function renderPills(arr){return arr.map(function(x){return pillType(x.type,x.text).replace('__ID__',x.id).replace('__DK__',dk);}).join('');}
    return'<div class="day-card'+(isToday?' today':'')+'">'+
      '<h4>'+DAYS[i]+'</h4><div class="day-date">'+d.getDate()+'/'+(d.getMonth()+1)+'</div>'+
      renderPills(calItems)+
      '<div class="slot-group"><div class="slot-hdr">🌅 Brekky</div>'+renderPills(bItems)+'</div>'+
      '<div class="slot-group"><div class="slot-hdr">☀️ Lunch</div>'+renderPills(lItems)+'</div>'+
      '<div class="slot-group"><div class="slot-hdr">🍎 Snacks</div>'+renderPills(sItems)+'</div>'+
      '<button class="add-pill" data-addday="'+dk+'">+ add</button>'+
    '</div>';
  }).join('')+'</div>'+
  '<div class="section-box"><h3>🎯 Goals for this Week</h3><textarea id="goalsArea" placeholder="What do you want to achieve this week?">'+esc(goals[weekGoalKey]||'')+'</textarea><button class="btn-sage" id="saveGoalsBtn" style="margin-top:8px;padding:8px 16px;font-size:.85rem">Save Goals</button></div>'+
  '<div class="section-box"><h3>💪 Workout & Exercise Plan</h3><textarea id="workoutArea" placeholder="Plan workouts, track progress...">'+esc(workout[weekWorkoutKey]||'')+'</textarea><button class="btn-sage" id="saveWorkoutBtn" style="margin-top:8px;padding:8px 16px;font-size:.85rem">Save Plan</button></div>'+
  '<div class="sec-title">📒 My Private Recipes</div>'+
  '<div class="af"><h3>➕ Add Private Recipe</h3><div class="fr">'+
  '<input id="pn" type="text" placeholder="Recipe name"><input id="pc" type="text" placeholder="Category">'+
  '<input id="ptags" type="text" placeholder="Tags, comma-separated">'+
  '<input id="pi2" type="text" placeholder="Ingredients with quantities, comma-separated">'+
  '<textarea id="ps" placeholder="Method — one step per line"></textarea>'+
  '<button class="btn" data-apr="1">Save My Recipe</button></div></div>'+
  (function(){var myr=personalData.myRecipes?Object.values(personalData.myRecipes):[];
    if(!myr.length)return'<div class="emp"><span>📒</span>No private recipes yet!</div>';
    return myr.map(function(r){return'<div class="rc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><b style="font-size:.98rem">'+esc(r.name)+'</b><div style="margin-top:4px;font-size:.76rem;color:var(--muted)">'+esc(r.cat)+'</div></div><div style="display:flex;gap:4px"><button class="bsm bs" data-shr="'+r.id+'" style="font-size:.7rem">Share 📤</button><button class="del-btn" data-dpr="'+r.id+'">🗑</button></div></div><div class="rbs"><button class="bo" data-tp="'+r.id+'">▼ View</button><button class="bo bo-t" data-cp="'+r.id+'">👨‍🍳 Cook</button><button class="bo bo-s" data-editpr="'+r.id+'" style="font-size:.75rem">✏️ Edit</button></div>'+
      '<div class="edit-form" id="pef'+r.id+'">'+
        '<input type="text" id="pen_'+r.id+'" value="'+esc(r.name)+'" placeholder="Recipe name">'+
        '<input type="text" id="pec_'+r.id+'" value="'+esc(r.cat)+'" placeholder="Category">'+
        '<input type="text" id="pet_'+r.id+'" value="'+esc((r.tags||[]).join(', '))+'" placeholder="Tags">'+
        '<input type="text" id="pei_'+r.id+'" value="'+esc((r.ings||[]).join(', '))+'" placeholder="Ingredients">'+
        '<textarea id="pes_'+r.id+'" placeholder="Method">'+esc(r.steps||'')+'</textarea>'+
        '<div style="display:flex;gap:7px"><button class="bsm bt" data-savepr="'+r.id+'">Save</button><button class="bsm bx" data-cancelpr="'+r.id+'">Cancel</button></div>'+
      '</div>'+
      '<div class="rb" id="prb'+r.id+'">'+(r.ings&&r.ings.length?'<h4>Ingredients</h4><ul>'+r.ings.map(function(i){return'<li>'+esc(i)+'</li>';}).join('')+'</ul>':'')+(r.steps?'<h4>Method</h4><p>'+esc(r.steps)+'</p>':'')+'</div></div>';}).join('');
  })();

  g('mp').innerHTML=html;
  g('prevWeek').addEventListener('click',function(){currentWeekOffset--;renderMyPage();});
  g('nextWeek').addEventListener('click',function(){currentWeekOffset++;renderMyPage();});
  g('newQuoteBtn').addEventListener('click',function(){savePersonal('quote',QUOTES[Math.floor(Math.random()*QUOTES.length)]);});
  g('myQuoteBtn').addEventListener('click',function(){var q=prompt('Your quote:');var a=prompt('Author:');if(q)savePersonal('quote',{q:q,a:a||'Me'});});
  g('saveGoalsBtn').addEventListener('click',function(){var gls=personalData.goals||{};gls[weekGoalKey]=g('goalsArea').value;savePersonal('goals',gls);alert('Goals saved! 🎯');});
  g('saveWorkoutBtn').addEventListener('click',function(){var wk=personalData.workout||{};wk[weekWorkoutKey]=g('workoutArea').value;savePersonal('workout',wk);alert('Workout plan saved! 💪');});
}

// DAY MODAL
g('dayModalCancel').addEventListener('click',function(){g('dayModal').classList.add('h');});
g('dayModalType').addEventListener('change',function(){
  var t=g('dayModalType').value;
  g('recipePickerWrap').style.display=(t==='B'||t==='L'||t==='S')?'block':'none';
});
g('dayModalSave').addEventListener('click',saveDayItem);
g('dayModalInput').addEventListener('keydown',function(e){if(e.key==='Enter')saveDayItem();});
function saveDayItem(){
  var type=g('dayModalType').value;var text=g('dayModalInput').value.trim();if(!text)return;
  var dk=dayCtx.dk;var id='i'+Date.now();
  var item={id:id,text:text,type:type};
  db.ref('personal/'+un+'/days/'+dk+'/items/'+id).set(item);
  g('dayModal').classList.add('h');g('dayModalInput').value='';
}

// ALL EVENTS
document.addEventListener('change',function(e){
  if(e.target.dataset.dci){
    if(!un){alert('Enter your name first!');e.target.checked=!e.target.checked;return;}
    var eid=e.target.dataset.dev,did=e.target.dataset.dci;
    var ev=events.find(function(x){return x.id===eid;});if(!ev)return;
    var dishes=ev.dishes?Object.values(ev.dishes):[];
    var dish=dishes.find(function(d){return d.id===did;});if(!dish)return;
    if(dish.by&&dish.by!==un){alert(dish.by+' is already bringing this!');e.target.checked=false;return;}
    dish.by=dish.by===un?'':un;
    db.ref('events/'+eid+'/dishes/'+did+'/by').set(dish.by);return;
  }
  if(e.target.dataset.shid){
    if(!un){alert('Enter your name first!');return;}
    var sid=e.target.dataset.shid;var item=shopItems.find(function(s){return s.id===sid;});if(!item)return;
    item.done=!item.done;item.by=item.done?un:'';
    db.ref('shopping/'+sid).update({done:item.done,by:item.by});return;
  }
});

document.addEventListener('click',function(e){
  var t=e.target;
  // tag filter
  var tg=t.closest('[data-tag]');if(tg&&tg.closest('#tagsFilter')){activeTagFilter=tg.dataset.tag;updateTagsFilter();renderRecipes();return;}
  // recipe toggle
  var tr=t.closest('[data-tr]');if(tr){var b=g('rb'+tr.dataset.tr);b.classList.toggle('o');tr.textContent=b.classList.contains('o')?'▲ Hide':'▼ View';return;}
  // personal recipe toggle
  var tp=t.closest('[data-tp]');if(tp){var pb=g('prb'+tp.dataset.tp);pb.classList.toggle('o');tp.textContent=pb.classList.contains('o')?'▲ Hide':'▼ View';return;}
  // edit personal recipe open
  var epr=t.closest('[data-editpr]');if(epr){var pef=g('pef'+epr.dataset.editpr);if(pef)pef.classList.toggle('o');return;}
  // cancel personal recipe edit
  var cpr=t.closest('[data-cancelpr]');if(cpr){var pef2=g('pef'+cpr.dataset.cancelpr);if(pef2)pef2.classList.remove('o');return;}
  // save personal recipe edit
  var spr=t.closest('[data-savepr]');if(spr){
    var pid=spr.dataset.savepr;
    var updates={};
    updates.name=g('pen_'+pid).value.trim();
    updates.cat=g('pec_'+pid).value.trim()||'General';
    updates.tags=g('pet_'+pid).value.split(',').map(function(s){return s.trim().toLowerCase();}).filter(Boolean);
    updates.ings=g('pei_'+pid).value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    updates.steps=g('pes_'+pid).value.trim();
    db.ref('personal/'+un+'/myRecipes/'+pid).update(updates);
    var pef3=g('pef'+pid);if(pef3)pef3.classList.remove('o');return;}
  // edit recipe open
  var er=t.closest('[data-editr]');if(er){var ef=g('ef'+er.dataset.editr);ef.classList.toggle('o');return;}
  // cancel edit
  var ce=t.closest('[data-canceledit]');if(ce){g('ef'+ce.dataset.canceledit).classList.remove('o');return;}
  // save edit
  var sr2=t.closest('[data-saver]');if(sr2){
    var rid=sr2.dataset.saver;
    var rec=recipes.find(function(r){return r.id===rid;});if(!rec)return;
    rec.name=g('en_'+rid).value.trim()||rec.name;
    rec.cat=g('ec_'+rid).value.trim()||rec.cat;
    rec.tags=g('et_'+rid).value.split(',').map(function(s){return s.trim().toLowerCase();}).filter(Boolean);
    rec.ings=g('ei_'+rid).value.split(',').map(function(s){return s.trim();}).filter(Boolean);
    rec.steps=g('es_'+rid).value.trim();
    db.ref('recipes/'+rid).update({name:rec.name,cat:rec.cat,tags:rec.tags,ings:rec.ings,steps:rec.steps});
    g('ef'+rid).classList.remove('o');return;}
  // delete recipe (admin only)
  var dr=t.closest('[data-dr]');if(dr){if(un!==ADMIN){alert('Only Mum can delete recipes.');return;}if(!confirm('Remove?'))return;db.ref('recipes/'+dr.dataset.dr).remove();return;}
  // delete personal recipe
  var dpr=t.closest('[data-dpr]');if(dpr){if(!confirm('Remove?'))return;db.ref('personal/'+un+'/myRecipes/'+dpr.dataset.dpr).remove();return;}
  // share personal recipe
  var shr=t.closest('[data-shr]');if(shr){var myr=personalData.myRecipes||{};var srec=myr[shr.dataset.shr];if(!srec)return;db.ref('recipes/'+srec.id).set(Object.assign({},srec,{by:un,notes:{}}));db.ref('personal/'+un+'/myRecipes/'+srec.id).remove();alert('"'+srec.name+'" shared! 🎉');return;}
  // cook mode family
  var cr=t.closest('[data-cr]');if(cr){var crec=recipes.find(function(r){return r.id===cr.dataset.cr;});if(crec)enterCookMode(crec);return;}
  // cook mode personal
  var cp=t.closest('[data-cp]');if(cp){var myr2=personalData.myRecipes||{};var pr=myr2[cp.dataset.cp];if(pr)enterCookMode(pr);return;}
  // add note
  var an=t.closest('[data-addnote]');if(an){var rid2=an.dataset.addnote;var inp=g('ni_'+rid2);if(!inp||!inp.value.trim())return;var nid='n'+Date.now();db.ref('recipes/'+rid2+'/notes/'+nid).set({id:nid,text:inp.value.trim(),by:un||'Family'});inp.value='';return;}
  // delete note
  var dn=t.closest('[data-delnote]');if(dn){db.ref('recipes/'+dn.dataset.recid+'/notes/'+dn.dataset.delnote).remove();return;}
  // delete event (admin only)
  var de=t.closest('[data-de]');if(de){if(un!==ADMIN){alert('Only Mum can delete events.');return;}if(!confirm('Remove event?'))return;db.ref('events/'+de.dataset.de).remove();return;}
  // delete dish (admin only)
  var dd=t.closest('[data-dd]');if(dd){db.ref('events/'+dd.dataset.dev+'/dishes/'+dd.dataset.dd).remove();return;}
  // add dish button
  var dadd=t.closest('[data-dadd]');if(dadd){addDishToEvent(dadd.dataset.dadd);return;}
  // autocomplete select
  var aci=t.closest('[data-recname]');if(aci){var inp2=g('dac_'+aci.closest('.dish-input-wrap').id.replace('diw_',''));if(inp2){inp2.value=aci.dataset.recname;var dal=aci.closest('.dish-ac-list');if(dal)dal.style.display='none';}return;}
  // delete event (admin only)
  var dsh=t.closest('[data-dsh]');if(dsh){if(un!==ADMIN)return;db.ref('shopping/'+dsh.dataset.dsh).remove();return;}
  // add day item
  var ad=t.closest('[data-addday]');if(ad){dayCtx={dk:ad.dataset.addday};g('dayModalTitle').textContent='Add to '+ad.dataset.addday;g('dayModalInput').value='';g('dayModalType').value='B';g('recipePickerWrap').style.display='block';g('dayModal').classList.remove('h');setTimeout(function(){g('dayModalInput').focus();},80);return;}
  // delete day item
  var dd2=t.closest('[data-delday-id]');if(dd2){db.ref('personal/'+un+'/days/'+dd2.dataset.dk+'/items/'+dd2.dataset.deldayId).remove();return;}
  // add personal recipe
  var apr=t.closest('[data-apr]');if(apr){var pn=g('pn').value.trim();if(!pn){alert('Enter a recipe name.');return;}var prec={id:'pr'+Date.now(),name:pn,cat:g('pc').value.trim()||'General',tags:g('ptags').value.split(',').map(function(s){return s.trim().toLowerCase();}).filter(Boolean),by:un||'Me',src:'',ings:g('pi2').value.split(',').map(function(s){return s.trim();}).filter(Boolean),steps:g('ps').value.trim()};db.ref('personal/'+un+'/myRecipes/'+prec.id).set(prec);['pn','pc','ptags','pi2','ps'].forEach(function(i){g(i).value='';});return;}
});

init();
</script>
