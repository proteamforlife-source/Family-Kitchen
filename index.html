<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👨‍👩‍👧‍👦 Family Kitchen</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#8FA68E;--saged:#6d8a6c;--cream:#F6F1E8;--terra:#C97B63;--terrad:#a85e47;
  --charcoal:#2B2B2B;--muted:#7a7a6a;--card:#fff;--border:#ddd6c8;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--gl:#eaf3ea;--re:#c0392b;--bl:#3a7bd5;
}
body{font-family:'Segoe UI',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--sage);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;transition:opacity 0.5s}
#loading.hidden{display:none}
#loading h1{font-size:2.5rem;margin-bottom:8px}
#loading p{font-size:1rem;opacity:0.85}

/* NAME MODAL */
#nameModal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
#nameModal.hidden{display:none}
.modal-box{background:var(--card);border-radius:20px;padding:32px;max-width:340px;width:90%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-box h2{color:var(--terra);font-size:1.7rem;margin-bottom:8px}
.modal-box p{color:var(--muted);margin-bottom:20px}
.modal-box input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:1rem;margin-bottom:14px;outline:none;font-family:inherit}
.modal-box input:focus{border-color:var(--terra)}

/* HEADER */
header{background:var(--sage);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.1)}
header h1{font-size:1.25rem;font-weight:700}
.user-pill{background:rgba(255,255,255,.25);padding:5px 13px;border-radius:20px;font-size:.83rem;cursor:pointer;white-space:nowrap}

/* NAV */
nav{background:var(--card);border-bottom:2px solid var(--border);display:flex;position:sticky;top:53px;z-index:99;overflow-x:auto}
nav button{flex:1;min-width:80px;padding:13px 6px;border:none;background:none;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.a{color:var(--terra);border-bottom-color:var(--terra)}
nav button:hover{background:var(--cream)}

main{max-width:720px;margin:0 auto;padding:18px 14px}
.sec{display:none}.sec.a{display:block}

/* CARDS & FORMS */
.card{background:var(--card);border-radius:13px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.af{background:var(--cream);border-radius:13px;padding:16px;margin-bottom:18px;border:1px solid var(--border)}
.af h3{margin-bottom:12px;color:var(--terrad);font-size:.93rem;font-weight:700}
.fr{display:flex;flex-direction:column;gap:9px}
.fr input,.fr textarea,.fr select{padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.92rem;background:#fff;outline:none;font-family:inherit;color:var(--charcoal)}
.fr input:focus,.fr textarea:focus{border-color:var(--terra)}
.fr textarea{resize:vertical;min-height:75px}
.btn{background:var(--terra);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.92rem;transition:background .2s}
.btn:hover{background:var(--terrad)}
.btn-sage{background:var(--sage);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;cursor:pointer;font-size:.92rem}
.btn-sage:hover{background:var(--saged)}
.bsm{padding:5px 11px;border-radius:7px;border:none;font-size:.8rem;font-weight:600;cursor:pointer}
.bt{background:var(--terra);color:#fff}
.bs{background:var(--sage);color:#fff}
.bx{background:var(--border);color:var(--muted)}
.sec-title{font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--charcoal)}
.tag{background:var(--cream);padding:2px 9px;border-radius:20px;font-size:.76rem;color:var(--terrad);font-weight:600;border:1px solid var(--border);cursor:pointer;display:inline-block;margin:2px}
.tag.active{background:var(--terra);color:#fff;border-color:var(--terra)}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;padding:2px 5px;border-radius:5px;font-size:.95rem;flex-shrink:0}
.del-btn:hover{color:var(--re);background:#ffeaea}
.emp{text-align:center;padding:36px 16px;color:var(--muted)}
.emp span{font-size:2.8rem;display:block;margin-bottom:10px}

/* RECIPE CARDS */
.rc{background:var(--card);border-radius:13px;padding:14px;margin-bottom:11px;box-shadow:var(--shadow);border:1px solid var(--border)}
.rb{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:none}
.rb.o{display:block}
.rb h4{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.rb ul{padding-left:16px;margin-bottom:10px}
.rb ul li{font-size:.88rem;margin-bottom:2px}
.rb p{font-size:.88rem;line-height:1.65;white-space:pre-line}
.rbs{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.bo{background:none;border:1.5px solid var(--border);padding:4px 11px;border-radius:7px;font-size:.78rem;cursor:pointer;color:var(--muted);font-weight:600}
.bo:hover{background:var(--cream)}
.bo-t{border-color:var(--terra);color:var(--terra)}
.bo-s{border-color:var(--sage);color:var(--sage)}

/* NOTES */
.note-item{background:var(--cream);border-radius:7px;padding:7px 10px;margin-bottom:5px;font-size:.83rem;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.note-who{font-size:.72rem;color:var(--terra);font-weight:600;white-space:nowrap}
.add-note-row{display:flex;gap:7px;margin-top:7px}
.add-note-row input{flex:1;padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;font-family:inherit}
.add-note-row input:focus{border-color:var(--terra)}

/* COOK MODE */
#ck{position:fixed;inset:0;background:#1a1a0f;z-index:999;display:none;flex-direction:column}
#ck.s{display:flex}
.ch{background:#2a2a18;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #3a3a20;flex-shrink:0}
.ct{color:#d4c87a;font-size:1.1rem;font-weight:700;flex:1;margin-right:10px}
.cb{background:none;border:1px solid #5a5a30;color:#d4c87a;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.8rem}
.ckb{flex:1;overflow-y:auto;padding:18px}
.cs{color:var(--terra);font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid #3a3a20}
.il{list-style:none;padding:0;margin-bottom:24px}
.il li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #2a2a18}
.il li:last-child{border-bottom:none}
.iq{color:#d4c87a;font-weight:700;min-width:100px;font-size:.97rem}
.in{color:#f0e8c8;font-size:.97rem}
.st2{background:#2a2a18;border-radius:11px;padding:18px;margin-bottom:9px;border-left:4px solid var(--terra);display:none}
.st2.ac,.st2.sa{display:block}
.sl{color:#d4c87a;font-size:.78rem;font-weight:700;text-transform:uppercase;margin-bottom:8px}
.sx{color:#f0e8c8;font-size:1.05rem;line-height:1.7}
.cf{background:#2a2a18;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid #3a3a20;flex-shrink:0}
.cn{background:var(--terra);color:#fff;border:none;padding:11px 22px;border-radius:9px;font-size:.97rem;font-weight:700;cursor:pointer}
.cn:disabled{background:#3a3a20;color:#6a6a40;cursor:not-allowed}
.cp{color:#8a8a50;font-size:.88rem}

/* EVENTS */
.eb{display:inline-block;background:var(--terra);color:#fff;padding:2px 9px;border-radius:20px;font-size:.76rem;font-weight:600;margin-top:4px}
.dr{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}
.dc{width:18px;height:18px;accent-color:var(--sage);cursor:pointer;flex-shrink:0}
.dn{flex:1;font-size:.9rem}
.dn.t{text-decoration:line-through;color:var(--muted)}
.dw{font-size:.76rem;color:var(--sage);font-weight:600}
.adr{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.adr input,.adr select{flex:1;min-width:120px;padding:7px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;background:#fff}
.adr input:focus{border-color:var(--terra)}
.adb{background:none;border:1.5px dashed var(--border);width:100%;padding:7px;border-radius:8px;color:var(--muted);cursor:pointer;font-size:.86rem;margin-top:7px}
.adb:hover{background:var(--cream);border-color:var(--terra);color:var(--terra)}

/* MY PAGE */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.week-nav button{background:var(--sage);color:#fff;border:none;padding:6px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600}
.week-nav span{font-weight:700;color:var(--charcoal);font-size:.95rem}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:16px}
.day-card{background:var(--card);border-radius:9px;padding:6px 5px;border:1px solid var(--border);min-width:0}
.day-card.today{border-color:var(--terra);background:#fdf5f3}
.day-card h4{font-size:.68rem;font-weight:700;text-align:center;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.day-date{font-size:.6rem;text-align:center;color:var(--muted);margin-bottom:4px}
.slot-label{font-size:.6rem;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:1px}
.meal-pill{background:var(--cream);border-radius:4px;padding:2px 5px;font-size:.65rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;word-break:break-word;border:1px solid var(--border)}
.cal-pill{background:#e8f0fe;border-radius:4px;padding:2px 5px;font-size:.65rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#3a5a9a;border:1px solid #c0d0f0}
.work-pill{background:#fef3e8;border-radius:4px;padding:2px 5px;font-size:.65rem;font-weight:600;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;gap:2px;color:#8a5a20;border:1px solid #f0d0a0}
.add-pill{background:none;border:1px dashed var(--border);width:100%;padding:2px;border-radius:4px;color:var(--muted);cursor:pointer;font-size:.6rem;margin-bottom:2px}
.add-pill:hover{border-color:var(--terra);color:var(--terra)}

/* QUOTE BOX */
.quote-box{background:linear-gradient(135deg,var(--sage),var(--saged));border-radius:13px;padding:20px;margin-bottom:18px;text-align:center;color:#fff}
.quote-text{font-size:1rem;line-height:1.6;font-style:italic;margin-bottom:10px}
.quote-author{font-size:.8rem;opacity:.85;margin-bottom:14px}
.quote-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.qbtn{background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600}

/* GOALS & WORKOUT */
.section-box{background:var(--card);border-radius:13px;padding:14px;margin-bottom:14px;border:1px solid var(--border)}
.section-box h3{font-size:.9rem;font-weight:700;color:var(--terrad);margin-bottom:10px}
.section-box textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.88rem;background:var(--cream);outline:none;font-family:inherit;resize:vertical;min-height:80px}
.section-box textarea:focus{border-color:var(--terra)}

/* MINI MODAL */
.mm{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:500}
.mm.h{display:none}
.mx{background:var(--card);border-radius:15px;padding:22px;max-width:320px;width:90%;box-shadow:0 6px 28px rgba(0,0,0,.18)}
.mx h3{margin-bottom:12px;color:var(--terra);font-size:.97rem}
.mx input,.mx select,.mx textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;margin-bottom:10px;outline:none;font-family:inherit;background:#fff}
.mx input:focus,.mx textarea:focus{border-color:var(--terra)}
.mr2{display:flex;gap:8px;justify-content:flex-end}

/* SEARCH/FILTER */
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:150px;padding:9px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;outline:none;font-family:inherit;background:#fff}
.search-bar input:focus{border-color:var(--terra)}
.tags-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}

@media(max-width:500px){.week-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div id="loading">
  <h1>👨‍👩‍👧‍👦</h1>
  <h1 style="font-size:1.8rem">Family Kitchen</h1>

</div>

<div id="nameModal" class="hidden">
  <div class="modal-box">
    <h2>👨‍👩‍👧‍👦</h2>
    <h2>Family Kitchen</h2>
    <p>What's your name? We'll remember you!</p>
    <input id="ni" type="text" placeholder="Enter your name..." maxlength="30">
    <button class="btn" id="jb" style="width:100%">Join the Kitchen 🍽️</button>
  </div>
</div>

<!-- Day detail modal -->
<div class="mm h" id="dayModal">
  <div class="mx">
    <h3 id="dayModalTitle">Add to Day</h3>

      <option value="B">🌅 Breakfast</option>
      <option value="L">☀️ Lunch</option>

      </select>
    </div>
    <div class="mr2">
      <button class="bsm bx" id="dayModalCancel">Cancel</button>
      <button class="bsm bt" id="dayModalSave">Save</button>
    </div>
  </div>
</div>

<!-- Cook mode -->
<div id="ck">
  <div class="ch">
    <div class="ct" id="ckt"></div>
    <div style="display:flex;gap:7px">
      <button class="cb" id="cka">📋 All Steps</button>
      <button class="cb" id="cke">✕ Exit</button>
    </div>
  </div>
  <div class="ckb" id="ckb"></div>
  <div class="cf">
    <button class="cn" id="ckp">← Prev</button>
    <span class="cp" id="ckpr"></span>
    <button class="cn" id="ckn">Next →</button>
  </div>
</div>

<header>
  <h1>👨‍👩‍👧‍👦 Family Kitchen</h1>
  <div class="user-pill" id="up">👤 ...</div>
</header>
<nav>
  <button class="a" id="t-r">📖 Recipes</button>
  <button id="t-e">🗓️ Events</button>
  <button id="t-m">👤 My Page</button>
</nav>

<main>
  <!-- RECIPES -->
  <div id="r" class="sec a">
    <div class="af">
      <h3>➕ Add Recipe</h3>
      <div class="fr">
        <input id="rn" type="text" placeholder="Recipe name">
        <input id="rcat" type="text" placeholder="Category (e.g. Mains, Desserts, Breakfast)">
        <input id="rtags" type="text" placeholder="Tags, comma-separated (e.g. gluten free, quick, whole food)">
        <input id="ri" type="text" placeholder="Ingredients with quantities, comma-separated">
        <textarea id="rs" placeholder="Method — one step per line"></textarea>
        <button class="btn" id="arb">Save Recipe</button>
      </div>
    </div>
    <div class="search-bar">
      <input id="rsearch" type="text" placeholder="🔍 Search recipes...">
    </div>
    <div class="tags-filter" id="tagsFilter"></div>
    <div class="sec-title">📖 Family Recipes</div>
    <div id="rl"></div>
  </div>

  <!-- EVENTS -->
  <div id="e" class="sec">
    <div class="af">
      <h3>➕ Add an Event</h3>
      <div class="fr">
        <input id="en" type="text" placeholder="Event name (e.g. Sunday BBQ 🔥)">
        <input id="ed" type="date">
        <input id="ex2" type="text" placeholder="Notes (optional)">
        <button class="btn" id="aeb">Save Event</button>
      </div>
    </div>
    <div class="sec-title">🗓️ Events</div>
    <div id="el"></div>
  </div>

  <!-- MY PAGE -->
  <div id="m" class="sec">
    <div id="mp"></div>
  </div>
</main>

// Get Monday of week with offset
function getWeekStart(offset){
  var now=new Date();
  var day=now.getDay()||7;
  now.setDate(now.getDate()-day+1+(offset*7));
  now.setHours(0,0,0,0);
  return now;
}
function getWeekDates(offset){
  var start=getWeekStart(offset);
  var dates=[];
  for(var i=0;i<7;i++){
    var d=new Date(start);
    d.setDate(start.getDate()+i);
    dates.push(d);
  }
  return dates;
}
function dateKey(d){return d.toISOString().split('T')[0]}
function todayKey(){return dateKey(new Date())}

function parseIng(s){
  var m=s.match(/^([\d¼½¾⅓⅔\/\.\s]+\s*(?:g|kg|ml|l|L|tsp|tbsp|cups?|oz|lbs?|pinch|bunch|slices?|cans?|pieces?|cloves?|sprigs?|large|medium|small|whole)?\.?)\s*(.+)$/i);
  return m?{q:m[1].trim(),n:m[2].trim()}:{q:'',n:s};
}
function enterCookMode(rec){
  g('ckt').textContent='👨‍🍳 '+rec.name;
  var p=(rec.ings||[]).map(parseIng);
  var ih='<div style="margin-bottom:24px"><div class="cs">📦 Gather Your Ingredients</div>'+

  cks=(rec.steps||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
  var sh='<div><div class="cs">👨‍🍳 Method</div><div id="ckw">'+
    cks.map(function(s,i){return'<div class="st2'+(i===0?' ac':'')+'" id="cks'+i+'"><div class="sl">Step '+(i+1)+' of '+cks.length+'</div><div class="sx">'+esc(s)+'</div></div>';}).join('')+'</div></div>';
  g('ckb').innerHTML=ih+sh;cki=0;cka2=false;g('cka').textContent='📋 All Steps';uck();g('ck').classList.add('s');
}
function uck(){g('ckp').disabled=cki===0;g('ckn').disabled=cki>=cks.length-1;g('ckpr').textContent='Step '+(cki+1)+' of '+cks.length;}
g('ckp').addEventListener('click',function(){var o=g('cks'+cki);if(o&&!cka2)o.classList.remove('ac');cki=Math.max(0,cki-1);var c=g('cks'+cki);if(c){if(!cka2)c.classList.add('ac');c.scrollIntoView({behavior:'smooth',block:'nearest'});}uck();});
g('ckn').addEventListener('click',function(){var o=g('cks'+cki);if(o&&!cka2)o.classList.remove('ac');cki=Math.min(cks.length-1,cki+1);var c=g('cks'+cki);if(c){if(!cka2)c.classList.add('ac');c.scrollIntoView({behavior:'smooth',block:'nearest'});}uck();});
g('cka').addEventListener('click',function(){cka2=!cka2;var w=g('ckw');if(!w)return;w.querySelectorAll('.st2').forEach(function(s){s.classList.toggle('sa',cka2);});g('cka').textContent=cka2?'📍 Step Mode':'📋 All Steps';});

g('dayModalSave').addEventListener('click',function(){
  var type=g('dayModalType').value;
  var text=g('dayModalInput').value.trim();if(!text)return;
  var dk=dayCtx.dk;
  var id='i'+Date.now();
  var item={id:id,text:text,type:type};
  if(type==='B'||type==='L'){
    var rid=g('recipePicker').value;
    if(rid)item.recipeId=rid;
    db.ref('personal/'+un+'/days/'+dk+'/meals/'+id).set(item);
  } else {
    db.ref('personal/'+un+'/days/'+dk+'/cal/'+id).set(item);
  }
  g('dayModal').classList.add('h');
  g('dayModalInput').value='';
});

// ── ALL CLICK/CHANGE EVENTS ──
document.addEventListener('change',function(e){
  if(e.target.dataset.dci){
    if(!un){alert('Enter your name first!');e.target.checked=!e.target.checked;return;}
    var eid=e.target.dataset.dev,did=e.target.dataset.dci;
    var ev=events.find(function(x){return x.id===eid;});if(!ev)return;
    var dishes=ev.dishes?Object.values(ev.dishes):[];
    var dish=dishes.find(function(d){return d.id===did;});if(!dish)return;
    if(dish.by&&dish.by!==un){alert(dish.by+' is already bringing this!');e.target.checked=false;return;}
    dish.by=dish.by===un?'':un;
    fbUpdate('events/'+eid+'/dishes/'+did,{by:dish.by});
  }
});

document.addEventListener('click',function(e){
  var t=e.target;

  // Recipe toggle
  var tr=t.closest('[data-tr]');if(tr){var b=g('rb'+tr.dataset.tr);b.classList.toggle('o');tr.textContent=b.classList.contains('o')?'▲ Hide':'▼ View';return;}
  // Personal recipe toggle
  var tp=t.closest('[data-tp]');if(tp){var pb=g('prb'+tp.dataset.tp);pb.classList.toggle('o');tp.textContent=pb.classList.contains('o')?'▲ Hide':'▼ View';return;}
  // Delete recipe
  var dr=t.closest('[data-dr]');if(dr){if(!confirm('Remove?'))return;fbRemove('recipes/'+dr.dataset.dr);return;}
  // Delete personal recipe
  var dpr=t.closest('[data-dpr]');if(dpr){if(!confirm('Remove?'))return;fbRemove('personal/'+un+'/myRecipes/'+dpr.dataset.dpr);return;}
  // Share personal recipe
  var shr=t.closest('[data-shr]');if(shr){
    var myr=personalData.myRecipes||{};
    var sr=myr[shr.dataset.shr];if(!sr)return;
    fbSet('recipes/'+sr.id,Object.assign({},sr,{by:un,notes:{}}));
    fbRemove('personal/'+un+'/myRecipes/'+sr.id);
    alert('"'+sr.name+'" shared to the Family Cookbook! 🎉');return;}
  // Cook mode (family)
  var cr=t.closest('[data-cr]');if(cr){var rec=recipes.find(function(r){return r.id===cr.dataset.cr;});if(rec)enterCookMode(rec);return;}
  // Cook mode (personal)
  var cp=t.closest('[data-cp]');if(cp){var myr2=personalData.myRecipes||{};var pr=myr2[cp.dataset.cp];if(pr)enterCookMode(pr);return;}
  // Add note
  var an=t.closest('[data-addnote]');if(an){
    var rid=an.dataset.addnote;var inp=g('ni_'+rid);if(!inp||!inp.value.trim())return;
    var nid='n'+Date.now();
    fbSet('recipes/'+rid+'/notes/'+nid,{id:nid,text:inp.value.trim(),by:un||'Family'});
    inp.value='';return;}
  // Delete note
  var dn=t.closest('[data-delnote]');if(dn){fbRemove('recipes/'+dn.dataset.recid+'/notes/'+dn.dataset.delnote);return;}
  // Delete event
  var de=t.closest('[data-de]');if(de){if(!confirm('Remove event?'))return;fbRemove('events/'+de.dataset.de);return;}
  // Delete dish
  var dd=t.closest('[data-dd]');if(dd){fbRemove('events/'+dd.dataset.dev+'/dishes/'+dd.dataset.dd);return;}
  // Open add dish
  var dao=t.closest('[data-dao]');if(dao){var row=g('adr'+dao.dataset.dao);if(row){row.style.display='flex';var inp2=g('dinput'+dao.dataset.dao);if(inp2)inp2.focus();}return;}
  // Cancel add dish
  var dox=t.closest('[data-dox]');if(dox){var row2=g('adr'+dox.dataset.dox);if(row2)row2.style.display='none';return;}
  // Confirm add dish
  var dok=t.closest('[data-dok]');if(dok){
    var eid2=dok.dataset.dok;
    var inp3=g('dinput'+eid2);if(!inp3||!inp3.value.trim())return;
    var recsel=g('drecipe'+eid2);
    var did2='d'+Date.now();
    var dish2={id:did2,name:inp3.value.trim(),by:''};
    if(recsel&&recsel.value)dish2.recipeId=recsel.value;
    fbSet('events/'+eid2+'/dishes/'+did2,dish2);
    inp3.value='';if(recsel)recsel.value='';
    g('adr'+eid2).style.display='none';return;}
  // Add day item
  var ad=t.closest('[data-addday]');if(ad){
    dayCtx={dk:ad.dataset.addday};
    g('dayModalTitle').textContent='Add to '+ad.dataset.addday;
    g('dayModalInput').value='';g('dayModalType').value='B';g('recipePickerWrap').style.display='block';
    g('dayModal').classList.remove('h');
    setTimeout(function(){g('dayModalInput').focus();},80);return;}
  // Delete meal from day
  var dm=t.closest('[data-delmeal]');if(dm){fbRemove('personal/'+un+'/days/'+dm.dataset.dk+'/meals/'+dm.dataset.delmeal);return;}
  // Delete cal from day
  var dc2=t.closest('[data-delcal]');if(dc2){fbRemove('personal/'+un+'/days/'+dc2.dataset.dk+'/cal/'+dc2.dataset.delcal);return;}
  // Add personal recipe
  var apr=t.closest('[data-apr]');if(apr){
    var pn=g('pn').value.trim();if(!pn){alert('Enter a recipe name.');return;}
    var prec={id:'pr'+Date.now(),name:pn,cat:g('pc').value.trim()||'General',
      tags:g('ptags').value.split(',').map(function(s){return s.trim().toLowerCase();}).filter(Boolean),
      by:un||'Me',src:'',
      ings:g('pi2').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
      steps:g('ps').value.trim()};
    fbSet('personal/'+un+'/myRecipes/'+prec.id,prec);
    ['pn','pc','ptags','pi2','ps'].forEach(function(i){g(i).value='';});return;}
});

init();
</script>
